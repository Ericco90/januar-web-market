<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Januar Web Brebes</title>
  <link rel="stylesheet" href="assets/css/style.css?v=3">
  <!-- Midtrans Snap.js (Sandbox) -->
  <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-cU4KmN6T6Y-W5bx2"></script>
</head>
<body style="background-color: var(--bg-color);">
  <div class="container" style="max-width: 600px; padding: 4rem 1.5rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html" class="logo" style="justify-content: center;">
        <img src="assets/img/logo.png" alt="Logo" style="height: 32px; border-radius: 50%; object-fit: cover;"> Januar Web Brebes
      </a>
      <h2 style="margin-top: 1rem;">Selesaikan Pesanan Anda</h2>
    </div>

    <div style="background: var(--surface-color); padding: 2rem; border-radius: var(--radius); box-shadow: var(--card-shadow); border: 1px solid var(--border-color);">
      
      <div id="order-summary" style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border-color);">
        <div class="loader-container"><div class="loader"></div></div>
      </div>

      <form id="checkoutForm">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Aktif (Untuk pengiriman file)</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nomor WhatsApp</label>
          <input type="text" id="wa" class="form-control" required placeholder="08...">
        </div>
        
        <button type="submit" id="btn-pay" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">
          Bayar Sekarang
        </button>
      </form>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js?v=3"></script>
  <script>
    let currentProduct = null;
    let isCartMode = false;
    let cartItems = [];
    let totalPrice = 0;

    document.addEventListener('DOMContentLoaded', async () => {
      const productId = getQueryParam('id');
      const isCart = getQueryParam('cart');

      if (isCart === '1') {
        isCartMode = true;
        cartItems = JSON.parse(localStorage.getItem('januar_cart') || '[]');
        if (cartItems.length === 0) {
          window.location.href = 'products.html';
          return;
        }

        totalPrice = cartItems.reduce((sum, item) => sum + parseInt(item.price), 0);
        
        let itemsHTML = cartItems.map(item => `
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <div>
              <div style="font-size: 0.95rem;">${item.name}</div>
            </div>
            <div style="font-weight: bold; color: var(--text-main);">
              ${formatRupiah(item.price)}
            </div>
          </div>
        `).join('');

        document.getElementById('order-summary').innerHTML = `
          <h3 style="margin-bottom: 1rem; border-bottom: 1px dashed var(--border-color); padding-bottom: 0.5rem;">Ringkasan Pesanan (Keranjang)</h3>
          ${itemsHTML}
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
            <div style="font-weight: bold;">Total Bayar</div>
            <div style="font-size: 1.25rem; font-weight: bold; color: var(--primary);">
              ${formatRupiah(totalPrice)}
            </div>
          </div>
        `;
      } else if (productId) {
        const res = await API.getProducts();
        if(res.status === 'success' && res.data) {
          currentProduct = res.data.find(p => p.id === productId);
          if(currentProduct) {
            totalPrice = currentProduct.harga;
            document.getElementById('order-summary').innerHTML = `
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                  <h3 style="font-size: 1.1rem; margin-bottom: 0.25rem;">${currentProduct.nama}</h3>
                  <span class="product-category">${currentProduct.kategori}</span>
                </div>
                <div style="font-size: 1.25rem; font-weight: bold; color: var(--primary);">
                  ${formatRupiah(currentProduct.harga)}
                </div>
              </div>
            `;
          } else {
            window.location.href = 'products.html';
          }
        }
      } else {
        window.location.href = 'products.html';
      }
    });

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if(!currentProduct && !isCartMode) return;

      const btn = document.getElementById('btn-pay');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<div class="loader" style="width:20px;height:20px;border-width:2px;display:inline-block;vertical-align:middle;"></div> Memproses...';
      btn.disabled = true;

      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        wa: document.getElementById('wa').value,
        price: totalPrice
      };

      if (isCartMode) {
        payload.cartItems = cartItems;
        payload.productName = "Pesanan Bundle (" + cartItems.length + " Produk)";
        payload.productId = "CART";
      } else {
        payload.productId = currentProduct.id;
        payload.productName = currentProduct.nama;
      }

      const res = await API.createOrder(payload);
      
      if(res.status === 'success') {
        const snapToken = res.data.snapToken;
        if(snapToken) {
          snap.pay(snapToken, {
            onSuccess: function(result){
              if(isCartMode) {
                localStorage.removeItem('januar_cart'); // Empty cart on success
                window.location.href = `success.html?order_id=${res.data.orderId}&cart=1`;
              } else {
                window.location.href = `success.html?order_id=${res.data.orderId}&file=${encodeURIComponent(currentProduct.file)}`;
              }
            },
            onPending: function(result){
              alert("Menunggu pembayaran!");
              btn.innerHTML = originalText;
              btn.disabled = false;
            },
            onError: function(result){
              alert("Pembayaran gagal!");
              btn.innerHTML = originalText;
              btn.disabled = false;
            },
            onClose: function(){
              alert('Anda menutup popup sebelum menyelesaikan pembayaran');
              btn.innerHTML = originalText;
              btn.disabled = false;
            }
          });
        } else {
          alert('Gagal mendapatkan token pembayaran: ' + (res.data.error || 'Unknown Error'));
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      } else {
        alert('Terjadi kesalahan sistem.');
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
