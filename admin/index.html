<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Januar Web</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.5rem;">Admin Panel</h1>
        <p style="color: var(--text-muted); font-size: 0.875rem;">Silakan login untuk mengelola marketplace.</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" id="btn-login" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if(localStorage.getItem('admin_token')) {
        window.location.href = 'dashboard.html';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btn-login');
      btn.innerHTML = 'Memproses...';
      btn.disabled = true;

      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      const res = await API.adminLogin(user, pass);
      
      if(res.status === 'success') {
        localStorage.setItem('admin_token', res.token);
        window.location.href = 'dashboard.html';
      } else {
        alert(res.message || 'Login gagal.');
        btn.innerHTML = 'Login';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
